<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VedaSolus â€” Coming 5.22.26 Â· DarkWave Studios</title>
  <meta name="description" content="Holistic wellness intelligence. Personalized guidance grounded in ancient wisdom and modern science. Part of the DarkWave Studios ecosystem. Launching May 22, 2026.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--accent:#00ffd4;--accent-dim:#00b4d8;--purple:#8a5cf6;--bg:#030712;--text:#f0f4f8;--text-dim:rgba(240,244,248,.55);--text-muted:rgba(240,244,248,.28);--border:rgba(255,255,255,.06);--border-hover:rgba(0,255,212,.18);--accent-glow:rgba(0,255,212,.08)}
    html,body{min-height:100vh;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

    /* Background */
    .bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.1;animation:drift 28s ease-in-out infinite alternate}
    .orb-1{width:600px;height:600px;background:var(--accent);top:-200px;left:-150px;animation-duration:32s}
    .orb-2{width:500px;height:500px;background:var(--purple);bottom:-150px;right:-100px;animation-duration:26s;animation-delay:8s}
    @keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(60px,-40px)}}
    .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px}

    /* Layout */
    .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}

    /* Logo */
    .dw-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:56px;text-decoration:none;opacity:.7;transition:opacity .2s}
    .dw-logo:hover{opacity:1}
    .dw-logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#000}
    .dw-logo-text{font-size:13px;font-weight:700;color:var(--text-dim);letter-spacing:.04em}

    /* App Icon */
    .app-icon{font-size:5rem;margin-bottom:24px;display:block;filter:drop-shadow(0 0 40px var(--accent-glow));animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

    /* Date badge */
    .date-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border-radius:999px;background:var(--accent-glow);border:1px solid var(--border-hover);font-size:11px;font-weight:800;color:var(--accent);margin-bottom:24px;letter-spacing:.12em;font-family:'JetBrains Mono',monospace}
    .date-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* Heading */
    h1{font-size:clamp(2.4rem,6vw,4rem);font-weight:900;letter-spacing:-.05em;line-height:1.08;margin-bottom:16px;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 60%,var(--text) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .app-desc{font-size:1rem;color:var(--text-dim);max-width:480px;margin:0 auto 40px;line-height:1.75}

    /* Countdown */
    .countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px}
    .cd-block{display:flex;flex-direction:column;align-items:center}
    .cd-num{font-size:clamp(2rem,5vw,3rem);font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--text);background:rgba(0,255,212,.06);border:1px solid rgba(0,255,212,.12);border-radius:12px;padding:12px 18px;min-width:70px;line-height:1;transition:all .3s}
    .cd-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.14em;margin-top:8px;font-weight:600}
    .cd-sep{font-size:2rem;font-weight:900;color:var(--accent);opacity:.4;padding-bottom:20px}

    /* Email capture */
    .capture{display:flex;gap:10px;max-width:420px;margin:0 auto 32px}
    .capture input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border-hover);border-radius:12px;padding:13px 18px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:all .2s}
    .capture input:focus{border-color:var(--accent);box-shadow:0 0 24px rgba(0,255,212,.1)}
    .capture input::placeholder{color:var(--text-muted)}
    .capture button{padding:13px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#000;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
    .capture button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,255,212,.25)}
    .capture button.done{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25);pointer-events:none}
    .capture-hint{font-size:11px;color:var(--text-muted);margin-bottom:40px}

    /* Footer links */
    .footer-links{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
    .footer-links a{font-size:12px;color:var(--text-muted);text-decoration:none;transition:color .2s}
    .footer-links a:hover{color:var(--accent)}
    .footer-links span{color:var(--border);font-size:12px}

    @media(max-width:480px){.capture{flex-direction:column}.countdown{gap:8px}.cd-num{padding:10px 12px;min-width:54px;font-size:1.6rem}}
  </style>
</head>
<body>
  <div class="bg-canvas"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <div class="bg-grid"></div>
  <div class="wrap">
    <a href="https://tlid.io" class="dw-logo">
      <div class="dw-logo-mark">DW</div>
      <span class="dw-logo-text">DarkWave Studios</span>
    </a>

    <span class="app-icon">🌿</span>
    <div class="date-badge">5.22.26</div>
    <h1>VedaSolus</h1>
    <p class="app-desc">Holistic wellness intelligence. Personalized guidance grounded in ancient wisdom and modern science.</p>

    <div class="countdown">
      <div class="cd-block"><span class="cd-num" id="cd-d">--</span><span class="cd-label">Days</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-h">--</span><span class="cd-label">Hours</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-m">--</span><span class="cd-label">Mins</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-num" id="cd-s">--</span><span class="cd-label">Secs</span></div>
    </div>

    <div class="capture">
      <input type="email" id="teaser-email" placeholder="your@email.com" autocomplete="email">
      <button id="teaser-btn" onclick="submitEmail()">Notify Me</button>
    </div>
    <p class="capture-hint">Be first to know when we go live. No spam, ever.</p>

    <div class="footer-links">
      <a href="https://axiom42.com">Axiom AI</a>
      <span>Â·</span>
      <a href="https://dwtl.io">Trust Layer</a>
      <span>Â·</span>
      <a href="https://tlid.io">TLID</a>
      <span>Â·</span>
      <a href="https://darkwavestudios.io">DarkWave Studios</a>
    </div>
  </div>

  <script>
    (function(){
      var launch = new Date('2026-05-22T09:00:00-05:00').getTime();
      function tick(){
        var diff = launch - Date.now();
        if(diff<=0){document.querySelector('.countdown').textContent='We are live!';return;}
        var pad=function(n){return n<10?'0'+n:''+n;};
        document.getElementById('cd-d').textContent=pad(Math.floor(diff/86400000));
        document.getElementById('cd-h').textContent=pad(Math.floor((diff%86400000)/3600000));
        document.getElementById('cd-m').textContent=pad(Math.floor((diff%3600000)/60000));
        document.getElementById('cd-s').textContent=pad(Math.floor((diff%60000)/1000));
      }
      tick(); setInterval(tick,1000);
    })();

    function submitEmail(){
      var input=document.getElementById('teaser-email');
      var btn=document.getElementById('teaser-btn');
      var email=input.value.trim();
      if(!email||!email.includes('@')){input.style.borderColor='rgba(239,68,68,.5)';setTimeout(function(){input.style.borderColor='';},1200);return;}
      try{var l=JSON.parse(localStorage.getItem('dw_launch_list')||'[]');if(!l.includes(email)){l.push(email);localStorage.setItem('dw_launch_list',JSON.stringify(l));}}catch(e){}
      fetch('https://axiom42.com/api/sms/optin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'Launch Subscriber',phone:'email-only',email:email,consent:true,consentTimestamp:new Date().toISOString(),consentSource:'teaser_'+window.location.hostname})}).catch(function(){});
      btn.textContent='âœ“ You\'re on the list';
      btn.classList.add('done');
      input.value='';
    }
    document.getElementById('teaser-email').addEventListener('keydown',function(e){if(e.key==='Enter')submitEmail();});
  </script>
</body>
</html>
